<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forge 3D - AI 3D Engine</title>
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #0b0f19;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 1. Top Header */
        .header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }

        .brand {
            font-weight: 800;
            font-size: 20px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(16, 185, 129, 0.2);
            font-size: 12px;
            color: #10b981;
            font-weight: 600;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
        }

        /* 2. Main 3D Viewport Area */
        .viewport-container {
            flex: 1;
            position: relative;
            background: radial-gradient(circle at center, #1e293b 0%, #0b0f19 100%);
            overflow: hidden;
        }

        #canvas3d {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Overlay Notification Panel */
        .overlay-msg {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 25px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            pointer-events: none; /* Touch pass karne ke liye */
            max-width: 90%;
            transition: all 0.3s ease;
        }

        .overlay-msg h4 {
            font-size: 14px;
            margin-bottom: 2px;
        }

        .overlay-msg p {
            font-size: 12px;
            color: #94a3b8;
        }

        /* 3. Professional Prompt Input Area */
        .prompt-section {
            padding: 15px 20px 25px 20px;
            background: #0f172a;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 30px;
            padding: 5px;
            padding-left: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .input-wrapper:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }

        .prompt-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 15px;
            outline: none;
            user-select: auto;
        }

        .prompt-input::placeholder {
            color: #64748b;
        }

        .send-btn {
            background: #3b82f6;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .send-btn:active {
            transform: scale(0.9);
            background: #2563eb;
        }

        .send-icon {
            font-size: 18px;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="brand">FORGE 3D</div>
        <div class="status-badge">
            <div class="pulse-dot"></div>
            <span>3D & Cloud Active</span>
        </div>
    </header>

    <main class="viewport-container">
        <div id="canvas3d"></div>

        <div class="overlay-msg" id="notify-card">
            <h4 id="status-title" style="color: #3b82f6;">AI 3D Viewport</h4>
            <p id="status-desc">Type 'cube', 'sphere' or 'cone' to test Prisma 3D engine.</p>
        </div>
    </main>

    <footer class="prompt-section">
        <div class="input-wrapper">
            <input type="text" id="prompt-input" class="prompt-input" placeholder="Type shape command here..." autocomplete="off">
            <button class="send-btn" id="send-btn">
                <span class="send-icon"></span>
            </button>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyDd2GwU88EOEEjBuJ24sxRlzjpuhRlWEBA",
            authDomain: "forge-3d-7ee40.firebaseapp.com",
            projectId: "forge-3d-7ee40",
            storageBucket: "forge-3d-7ee40.firebasestorage.app",
            messagingSenderId: "912860530280",
            appId: "1:912860530280:web:1f0bd05efdd24abf169ddd",
            measurementId: "G-Z1772PHWR0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- Three.js Asli 3D Setup ---
        const container = document.getElementById('canvas3d');
        const scene = new THREE.Scene();
        
        // Camera Setup
        const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.z = 5;

        // Renderer Setup
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Lights (Roshni)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0x3b82f6, 1); // Blue glow light
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        // Current Active 3D Object Mesh
        let currentMesh = null;

        // Automatically fix size on resize
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        // Touch Control Variables
        let isDragging = false;
        let previousTouchX = 0;
        let previousTouchY = 0;

        // Mobile Mobile Touch Interaction logic
        container.addEventListener('touchstart', (e) => {
            isDragging = true;
            previousTouchX = e.touches[0].clientX;
            previousTouchY = e.touches[0].clientY;
        });

        container.addEventListener('touchmove', (e) => {
            if (!isDragging || !currentMesh) return;
            
            const deltaX = e.touches[0].clientX - previousTouchX;
            const deltaY = e.touches[0].clientY - previousTouchY;

            currentMesh.rotation.y += deltaX * 0.01;
            currentMesh.rotation.x += deltaY * 0.01;

            previousTouchX = e.touches[0].clientX;
            previousTouchY = e.touches[0].clientY;
        });

        container.addEventListener('touchend', () => { isDragging = false; });

        // Animation Loop Engine
        function animate() {
            requestAnimationFrame(animate);
            if (currentMesh && !isDragging) {
                currentMesh.rotation.y += 0.01; // Auto rotation slow state
                currentMesh.rotation.x += 0.005;
            }
            renderer.render(scene, camera);
        }
        animate();

        // --- Prompt Box Engine & Firebase ---
        const promptInput = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');
        const statusTitle = document.getElementById('status-title');
        const statusDesc = document.getElementById('status-desc');

        async function process3DCommand() {
            const text = promptInput.value.trim().toLowerCase();
            if (!text) return;

            statusTitle.innerText = " Processing...";
            statusTitle.style.color = "#8b5cf6";
            statusDesc.innerText = "Generating 3D mesh and uploading to Cloud...";
            promptInput.value = "";

            // Purani shape ko delete karo agar koi khari hai
            if (currentMesh) {
                scene.remove(currentMesh);
            }

            let geometry;
            let material = new THREE.MeshStandardMaterial({ 
                color: 0x3b82f6, 
                roughness: 0.3,
                metalness: 0.2,
                wireframe: false 
            });
            let shapeDetected = "Unknown Prompt Logged";

            // Prompt checks
            if (text.includes("cube") || text.includes("box") || text.includes("dabba")) {
                geometry = new THREE.BoxGeometry(2, 2, 2);
                shapeDetected = "3D Cube Box";
                material.color.setHex(0x3b82f6); // Neon Blue
            } else if (text.includes("sphere") || text.includes("ball") || text.includes("gola")) {
                geometry = new THREE.SphereGeometry(1.3, 32, 32);
                shapeDetected = "3D Sphere Ball";
                material.color.setHex(0x10b981); // Neon Green
            } else if (text.includes("cone") || text.includes("pyramid")) {
                geometry = new THREE.ConeGeometry(1.3, 2.5, 32);
                shapeDetected = "3D Cone Pyramid";
                material.color.setHex(0xef4444); // Crimson Red
            } else {
                // Default box format if prompt layout doesn't match
                geometry = new THREE.TorusGeometry(1, 0.4, 16, 100);
                shapeDetected = `Custom: ${text}`;
                material.color.setHex(0x8b5cf6); // Purple Torus Ring
            }

            // Create Mesh and Add to Scene
            currentMesh = new THREE.Mesh(geometry, material);
            scene.add(currentMesh);

            // Firebase Logging Synchronously
            try {
                await addDoc(collection(db, "forge_3d_prisma_runs"), {
                    userInput: text,
                    detectedObject: shapeDetected,
                    author: "Sohaib Nazir",
                    timestamp: new Date()
                });

                statusTitle.innerText = " 3D Object Rendered!";
                statusTitle.style.color = "#10b981";
                statusDesc.innerText = `"${shapeDetected}" successfully saved to Firebase.`;
            } catch (error) {
                statusTitle.innerText = " Saved to Screen Only";
                statusTitle.style.color = "#ef4444";
                statusDesc.innerText = `Firebase sync failed: ${error.message}`;
            }
        }

        sendBtn.addEventListener('click', process3DCommand);
        promptInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') process3DCommand(); });
    </script>
</body>
</html>

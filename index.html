<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Live Test - Forge 3D</title>
    <style>
        body {
            background-color: #101112;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #181a1b;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            max-width: 90%;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
            width: 100%;
        }
        button:active {
            background: #1d4ed8;
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #8b9298;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Firebase Cloud Test </h2>
        <p>Sohaib bhai, neeche wala button daba kar check karein ke data live cloud par jata hai ya nahi!</p>
        <button id="btn-test">Send Data to Firebase</button>
        <div id="status">Status: Waiting for click...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // Aapki bilkul original aur asli configuration keys
        const firebaseConfig = {
            apiKey: "AIzaSyDd2GwU88EOEEjBuJ24sxRlzjpuhRlWEBA",
            authDomain: "forge-3d-7ee40.firebaseapp.com",
            projectId: "forge-3d-7ee40",
            storageBucket: "forge-3d-7ee40.firebasestorage.app",
            messagingSenderId: "912860530280",
            appId: "1:912860530280:web:1f0bd05efdd24abf169ddd",
            measurementId: "G-Z1772PHWR0"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Click Engine
        document.getElementById('btn-test').addEventListener('click', async () => {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Connecting to Google Cloud Servers...";
            statusDiv.style.color = "#3b82f6";

            try {
                // Yeh data ab seedha aapke Cloud Firestore mein save hoga
                await addDoc(collection(db, "forge_3d_users"), {
                    authorName: "Sohaib Nazir",
                    projectStatus: "Firebase Connected Successfully",
                    deviceConnected: "Mobile Infinix Smart 7",
                    timestamp: new Date()
                });

                statusDiv.innerText = " MUBARAK HO! Data cloud par chala gaya! Firebase 100% active hai.";
                statusDiv.style.color = "#10b981";
                alert("Success! Your test data has reached Firebase Cloud!");
                
            } catch (error) {
                console.error("Firebase Error: ", error);
                statusDiv.innerText = "Error: " + error.message;
                statusDiv.style.color = "#ef4444";
            }
        });
    </script>
</body>
</html>

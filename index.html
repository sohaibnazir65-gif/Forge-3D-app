<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forge 3D - Cloud Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #0d0f12;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        .top-bar {
            background: #15181e;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid #232834;
        }

        .logo {
            font-weight: bold;
            font-size: 18px;
            color: #3b82f6;
            letter-spacing: 0.5px;
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
        }

        /* Canvas Display Area */
        .canvas-container {
            flex: 1;
            position: relative;
            background: radial-gradient(circle, #1a1f29 0%, #0d0f12 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #display-screen {
            text-align: center;
            color: #64748b;
            font-size: 15px;
            padding: 20px;
            line-height: 1.6;
        }

        .highlight-text {
            color: #3b82f6;
            font-weight: bold;
        }

        /* Bottom Toolbar */
        .bottom-toolbar {
            background: #15181e;
            padding: 15px;
            border-top: 1px solid #232834;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 500px;
            margin: 0 auto;
        }

        .tool-btn {
            background: #1e2430;
            color: #cbd5e1;
            border: 1px solid #2d3648;
            padding: 14px 8px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .tool-btn:active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
            transform: scale(0.95);
        }

        .btn-icon {
            font-size: 20px;
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="logo">FORGE 3D</div>
        <div class="status-container">
            <div class="status-dot"></div>
            <span style="font-size: 12px; color: #10b981; font-weight: 600;">Firebase Live</span>
        </div>
    </header>

    <main class="canvas-container">
        <div id="display-screen">
            <p id="cloud-msg">Neeche se koi bhi shape add karein...<br>Woh live <span class="highlight-text">Firebase Database</span> par save ho jayegi!</p>
        </div>
    </main>

    <footer class="bottom-toolbar">
        <div class="tools-grid">
            <button class="tool-btn" id="btn-cube">
                <span class="btn-icon">📦</span>
                <span>Add Cube</span>
            </button>
            <button class="tool-btn" id="btn-sphere">
                <span class="btn-icon">🔵</span>
                <span>Add Sphere</span>
            </button>
            <button class="tool-btn" id="btn-cone">
                <span class="btn-icon">📐</span>
                <span>Add Cone</span>
            </button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // Aapki Verified Firebase Keys
        const firebaseConfig = {
            apiKey: "AIzaSyDd2GwU88EOEEjBuJ24sxRlzjpuhRlWEBA",
            authDomain: "forge-3d-7ee40.firebaseapp.com",
            projectId: "forge-3d-7ee40",
            storageBucket: "forge-3d-7ee40.firebasestorage.app",
            messagingSenderId: "912860530280",
            appId: "1:912860530280:web:1f0bd05efdd24abf169ddd",
            measurementId: "G-Z1772PHWR0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const displayScreen = document.getElementById('cloud-msg');

        // Data Bhejne Ka Universal Function
        async function sendShapeToFirebase(shapeName, shapeEmoji) {
            displayScreen.innerHTML = `Sending <span style="color:#3b82f6;">${shapeName}</span> to Firebase Cloud... ⏳`;
            
            try {
                await addDoc(collection(db, "forge_3d_shapes"), {
                    shapeType: shapeName,
                    createdBy: "Sohaib Nazir",
                    device: "Infinix Smart 7",
                    status: "Saved Successfully",
                    time: new Date()
                });

                displayScreen.innerHTML = `
                    <span style="font-size: 40px;">${shapeEmoji}</span><br>
                    <span style="color: #10b981; font-weight: bold; font-size: 16px;">🎉 SUCCESS!</span><br>
                    आपका <span style="color: white; font-weight:bold;">${shapeName}</span> live Firebase server par save ho gaya hai!
                `;
            } catch (error) {
                displayScreen.innerHTML = `<span style="color: #ef4444;">Error: ${error.message}</span>`;
            }
        }

        // Buttons Click Listeners
        document.getElementById('btn-cube').addEventListener('click', () => sendShapeToFirebase("Cube Box", "📦"));
        document.getElementById('btn-sphere').addEventListener('click', () => sendShapeToFirebase("Sphere Ball", "🔵"));
        document.getElementById('btn-cone').addEventListener('click', () => sendShapeToFirebase("Cone Pyramid", "📐"));
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>FORGE 3D - Creative Suite (Prisma Pro Edition)</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* SHARP UI UPDATE: Enhanced contrast and crisp colors */
        :root {
            --bg-canvas: #101112;      /* Darker canvas */
            --bg-panel: #181a1b;       /* Sharper panel background */
            --bg-hover: #26292b;       /* Crisp hover state */
            --text-main: #ffffff;      /* Pure white for sharpness */
            --text-muted: #8b9298;     /* Clean muted text */
            --accent-blue: #3b82f6;
            --border-color: rgba(255, 255, 255, 0.1);
            --bg-menu: rgba(20, 22, 24, 0.98);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background-color: var(--bg-canvas); font-family: 'Segoe UI', system-ui, sans-serif; touch-action: none; color: var(--text-main); font-weight: 500; }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        .ui-element { z-index: 10; position: absolute; }

        /* TOAST */
        #toast {
            position: absolute; top: 90px; left: 50%; transform: translateX(-50%); background: var(--text-main); color: var(--bg-canvas); padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: bold; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 50; box-shadow: 0 6px 20px rgba(0,0,0,0.5);
        }

        /* TOP POS PANEL */
        #pos-panel {
            top: 20px; left: 20px;
            background: rgba(24, 26, 27, 0.9); backdrop-filter: blur(8px);
            border: 1px solid var(--border-color); border-radius: 8px; padding: 10px 15px;
            font-size: 13px; font-weight: 700; pointer-events: none;
            display: flex; flex-direction: column; gap: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .pos-title { color: var(--text-muted); font-size: 11px; margin-bottom: 2px; }
        .pos-row { display: flex; gap: 10px; }
        .coord-x { color: #ff4757; } .coord-y { color: #2ed573; } .coord-z { color: #1e90ff; }

        /* TOP TRANSFORM BAR */
        #top-transform-bar {
            top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 12px;
            display: none; padding: 6px; gap: 6px; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        #top-transform-bar.show { display: flex; }
        .top-btn {
            background: transparent; border: none; color: var(--text-muted); font-size: 18px;
            width: 45px; height: 45px; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; display: flex; justify-content: center; align-items: center;
        }
        .top-btn:hover { background: var(--bg-hover); color: var(--text-main); }
        .top-btn.active { color: var(--accent-blue); background: rgba(59, 130, 246, 0.15); box-shadow: inset 0 0 0 1px var(--accent-blue); }
        .v-divider { width: 1px; background: var(--border-color); margin: 6px 2px; }

        /* MENU TOGGLE (Hamburger) */
        #menu-toggle {
            top: 20px; right: 20px; background: var(--bg-panel); border: 1px solid var(--border-color);
            color: var(--text-muted); width: 45px; height: 45px; border-radius: 10px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 20px; transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        #menu-toggle:hover { color: var(--text-main); background: var(--bg-hover); }

        /* SIDE MENU PANEL */
        #side-menu-panel {
            top: 0; right: 0; width: 280px; height: 100vh; background: var(--bg-menu); border-left: 1px solid var(--border-color);
            padding: 30px 20px; display: flex; flex-direction: column; gap: 20px;
            transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 40; box-shadow: -8px 0 32px rgba(0,0,0,0.6); backdrop-filter: blur(10px);
        }
        #side-menu-panel.show { transform: translateX(0); }
        
        .menu-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); }
        .menu-title { font-weight: bold; font-size: 18px; color: var(--text-main); }
        #menu-close { background: transparent; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; transition: color 0.2s; }
        #menu-close:hover { color: #ff4757; }

        .menu-link {
            background: transparent; border: none; color: var(--text-main); cursor: pointer;
            display: flex; align-items: center; gap: 15px; width: 100%; padding: 12px 15px; border-radius: 8px; font-size: 14px; font-weight: 600; text-align: left; text-decoration: none; transition: background 0.2s;
        }
        .menu-link:hover { background: var(--bg-hover); color: var(--accent-blue); }
        .menu-link i { font-size: 18px; min-width: 20px; color: var(--text-muted); }

        .menu-divider { height: 1px; background: var(--border-color); margin: 10px 0; }

        /* BOTTOM NAV */
        #bottom-navbar {
            bottom: 0; left: 0; width: 100%; height: 75px; background: var(--bg-panel); border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-around; align-items: center; z-index: 20; box-shadow: 0 -4px 24px rgba(0,0,0,0.6);
        }
        .nav-tab {
            background: transparent; border: none; color: var(--text-muted); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; height: 100%; justify-content: center; transition: color 0.2s;
        }
        .nav-tab i { font-size: 22px; } .nav-tab span { font-size: 11px; font-weight: 700; letter-spacing: 0.5px; }
        .nav-tab.active, .nav-tab:hover { color: var(--accent-blue); }

        /* SLIDING SUB-PANELS */
        .slide-panel {
            bottom: 75px; left: 0; width: 100%; background: rgba(24, 26, 27, 0.95); backdrop-filter: blur(12px); border-top: 1px solid var(--border-color); border-top-left-radius: 20px; border-top-right-radius: 20px; padding: 20px;
            transform: translateY(120%); opacity: 0; visibility: hidden; transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s;
            display: flex; gap: 12px; align-items: center; overflow-x: auto;
        }
        .slide-panel.show { transform: translateY(0); opacity: 1; visibility: visible; }
        .slide-panel::-webkit-scrollbar { height: 4px; } .slide-panel::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }
        
        .shape-swatch {
            background: var(--bg-panel); border: 1px solid var(--border-color); color: var(--text-main); min-width: 75px; height: 75px; border-radius: 12px; font-size: 14px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; gap: 6px; font-weight: 600;
        }
        .shape-swatch:active { transform: scale(0.94); }
        .shape-swatch:hover, .shape-swatch.active-mode { color: var(--text-main); border-color: var(--text-muted); background: var(--bg-hover); box-shadow: inset 0 0 0 1px var(--text-muted); }
        .shape-swatch svg { width: 32px; height: 32px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }

        .action-square {
            background: var(--bg-panel); border: 1px solid var(--border-color); color: var(--text-muted); min-width: 70px; height: 70px; border-radius: 12px; font-size: 20px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0;
        }
        .action-square:hover { background: var(--bg-hover); color: var(--text-main); }
        .action-square span { font-size: 11px; font-weight: 700; margin-top: 6px; }

        /* MATERIAL PICKER */
        .color-picker-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }
        #color-picker { width: 50px; height: 50px; border: none; border-radius: 50%; cursor: pointer; background: transparent; padding: 0; }
        #color-picker::-webkit-color-swatch-wrapper { padding: 0; }
        #color-picker::-webkit-color-swatch { border: 2px solid var(--text-muted); border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="toast">Message</div>

    <div id="pos-panel" class="ui-element">
        <span class="pos-title">Pos. (cm)</span>
        <div class="pos-row">
            <span class="coord-x">X <span id="val-x">0.0</span></span>
            <span class="coord-y">Y <span id="val-y">0.0</span></span>
            <span class="coord-z">Z <span id="val-z">0.0</span></span>
        </div>
    </div>

    <div id="top-transform-bar" class="ui-element">
        <button class="top-btn active" id="btn-move" title="Translate"><i class="fa-solid fa-arrows-up-down-left-right"></i></button>
        <button class="top-btn" id="btn-rotate" title="Rotate"><i class="fa-solid fa-rotate-right"></i></button>
        <button class="top-btn" id="btn-scale" title="Scale"><i class="fa-solid fa-expand"></i></button>
        <div class="v-divider"></div>
        <button class="top-btn delete" id="btn-delete" title="Delete"><i class="fa-solid fa-trash"></i></button>
    </div>

    <button id="menu-toggle" class="ui-element"><i class="fa-solid fa-bars"></i></button>

    <div id="side-menu-panel" class="ui-element">
        <div class="menu-header">
            <span class="menu-title">Prisma Pro Suite</span>
            <button id="menu-close"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <button class="menu-link"><i class="fa-solid fa-home"></i>Home</button>
        <button class="menu-link" onclick="window.location.reload()"><i class="fa-solid fa-file"></i>New Scene</button>
        
        <div class="menu-divider"></div>

        <input type="file" id="file-import" accept=".glb,.gltf" style="display: none;">
        
        <button class="menu-link" id="btn-import"><i class="fa-solid fa-file-import"></i>Import Asset (.gltf/.glb)</button>
        <button class="menu-link" id="btn-export"><i class="fa-solid fa-file-export"></i>Export Scene (.gltf)</button>

        <div class="menu-divider"></div>

        <button class="menu-link"><i class="fa-solid fa-gears"></i>App Settings</button>
        <a href="#" target="_blank" class="menu-link"><i class="fa-solid fa-file-shield"></i>Privacy Policy</a>
        <a href="#" target="_blank" class="menu-link"><i class="fa-solid fa-circle-info"></i>App Info / Verify</a>
    </div>

    <div id="panel-object" class="slide-panel ui-element">
        <button class="shape-swatch" id="add-cube"><svg viewBox="0 0 100 100"><polygon points="50 5 95 25 95 75 50 95 5 75 5 25" fill="#e0e0e0" stroke="#a0a0a0" stroke-width="2"/></svg>Cube</button>
        <button class="shape-swatch" id="add-sphere"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#efefef" stroke="#a0a0a0" stroke-width="2"/><circle cx="45" cy="45" r="2" fill="#fff" opacity="0.6"/></svg>Sphere</button>
        <button class="shape-swatch" id="add-cylinder"><svg viewBox="0 0 100 100"><ellipse cx="50" cy="15" rx="35" ry="10" fill="#e0e0e0"/><rect x="15" y="15" width="70" height="70" fill="#a0a0a0"/><ellipse cx="50" cy="85" rx="35" ry="10" fill="#a0a0a0"/></svg>Cylinder</button>
        <button class="shape-swatch" id="add-plane"><svg viewBox="0 0 100 100"><polygon points="10 30 90 30 70 80 30 80" fill="#a0a0a0" stroke="#f0f0f0" stroke-width="1.5"/></svg>Plane</button>
        <button class="shape-swatch" id="add-pyramid"><svg viewBox="0 0 100 100"><polygon points="50 5 95 85 50 95 5 85" fill="#f0f0f0"/><polygon points="50 5 50 95 5 85" fill="#e0e0e0"/></svg>Pyramid</button>
    </div>

    <div id="panel-modeling" class="slide-panel ui-element">
        <button class="action-square" id="btn-merge"><i class="fa-solid fa-object-group"></i><span>Merge All</span></button>
        <button class="action-square tool-btn"><i class="fa-solid fa-scissors"></i><span>Cut Loop</span></button>
        <button class="action-square tool-btn"><i class="fa-solid fa-soap"></i><span>Smooth</span></button>
    </div>

    <div id="panel-rigging" class="slide-panel ui-element">
        <button class="action-square tool-btn" id="btn-add-bone"><i class="fa-solid fa-bone"></i><span>Add Bone</span></button>
        <button class="action-square tool-btn" id="btn-skin"><i class="fa-solid fa-person"></i><span>Skinning</span></button>
        <button class="action-square tool-btn" id="btn-clear-skeleton"><i class="fa-solid fa-skull-crossbones"></i><span>Clear Skel</span></button>
    </div>

    <div id="panel-material" class="slide-panel ui-element">
        <div class="color-picker-wrap">
            <input type="color" id="color-picker" value="#ffffff">
            <span style="font-size: 12px; font-weight: 700; color: var(--text-muted); margin-top: 5px;">Mesh Albedo</span>
        </div>
    </div>

    <div id="bottom-navbar" class="ui-element">
        <button class="nav-tab" data-target="panel-object"><i class="fa-solid fa-folder-plus"></i><span>OBJECTS</span></button>
        <button class="nav-tab" data-target="panel-modeling"><i class="fa-solid fa-tools"></i><span>MODELING</span></button>
        <button class="nav-tab" data-target="panel-rigging"><i class="fa-solid fa-bone"></i><span>RIGGING</span></button>
        <button class="nav-tab" data-target="panel-material"><i class="fa-solid fa-palette"></i><span>MATERIAL</span></button>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';
        import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';
        
        // GLTF Loader & Exporter added to logic
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

        let scene, camera, renderer, orbitControls, transformControls;
        let raycaster, pointer;
        let interactableObjects = []; 
        let selectedObject = null;
        let appMode = 'DEFAULT';
        let bones = [], boneVisuals = [], skeletonHelper = null;

        const toast = document.getElementById('toast');
        const topTransformBar = document.getElementById('top-transform-bar');
        const colorPicker = document.getElementById('color-picker');
        const posVals = { x: document.getElementById('val-x'), y: document.getElementById('val-y'), z: document.getElementById('val-z') };
        const gizmoButtons = { translate: document.getElementById('btn-move'), rotate: document.getElementById('btn-rotate'), scale: document.getElementById('btn-scale') };
        const sideMenuPanel = document.getElementById('side-menu-panel');

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x101112); // Sharper dark background

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(7, 5, 9);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            const gridHelper = new THREE.GridHelper(30, 30, 0x333333, 0x181a1b);
            scene.add(gridHelper);

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 5);
            scene.add(directionalLight);

            orbitControls = new OrbitControls(camera, renderer.domElement);
            orbitControls.enableDamping = true; orbitControls.dampingFactor = 0.05;
            orbitControls.rotateSpeed = 0.25; orbitControls.maxPolarAngle = Math.PI / 2.1; 

            transformControls = new TransformControls(camera, renderer.domElement);
            transformControls.addEventListener('dragging-changed', (e) => orbitControls.enabled = !e.value);
            transformControls.addEventListener('change', updatePositionPanel);
            scene.add(transformControls);

            raycaster = new THREE.Raycaster(); pointer = new THREE.Vector2();

            addShape('cube'); 
            setupUIEvents();

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('pointerdown', onPointerDown);
        }

        function showToast(msg) {
            toast.innerText = msg; toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2500);
        }

        function addShape(type) {
            let geometry, yOffset = 0.75; 
            if (type === 'cube') geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
            else if (type === 'sphere') { geometry = new THREE.SphereGeometry(0.8, 32, 32); yOffset = 0.8; }
            else if (type === 'cylinder') geometry = new THREE.CylinderGeometry(0.6, 0.6, 1.5, 32);
            else if (type === 'plane') { geometry = new THREE.PlaneGeometry(2, 2); geometry.rotateX(-Math.PI / 2); yOffset = 0.01; }
            else if (type === 'pyramid') { geometry = new THREE.ConeGeometry(1, 1.5, 4); yOffset = 0.75; geometry.rotateY(Math.PI / 4); }

            const material = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.3, metalness: 0.2 });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(0, yOffset, 0); scene.add(mesh); interactableObjects.push(mesh); selectObject(mesh);
            showToast(`${type.charAt(0).toUpperCase() + type.slice(1)} Added`);
        }

        function selectObject(object) {
            if(appMode === 'BONE_MODE') return;
            selectedObject = object; transformControls.attach(object); topTransformBar.classList.add('show');
            if(object.material && object.material.color) {
                colorPicker.value = '#' + object.material.color.getHexString(); 
            }
            updatePositionPanel();
        }

        function deselectObject() {
            selectedObject = null; transformControls.detach(); topTransformBar.classList.remove('show');
            posVals.x.innerText = '0.0'; posVals.y.innerText = '0.0'; posVals.z.innerText = '0.0';
        }

        function updatePositionPanel() {
            if(selectedObject) {
                posVals.x.innerText = selectedObject.position.x.toFixed(1);
                posVals.y.innerText = selectedObject.position.y.toFixed(1);
                posVals.z.innerText = selectedObject.position.z.toFixed(1);
            }
        }

        function addBoneAt(position) {
            const bone = new THREE.Bone();
            if (bones.length === 0) {
                bone.position.copy(position); scene.add(bone);
            } else {
                const parent = bones[bones.length - 1]; parent.add(bone);
                const localPos = position.clone(); parent.worldToLocal(localPos); bone.position.copy(localPos);
            }
            bones.push(bone);

            const marker = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), new THREE.MeshBasicMaterial({ color: 0x3b82f6, depthTest: false }));
            marker.position.copy(position); marker.renderOrder = 999;
            scene.add(marker); boneVisuals.push(marker);

            if (skeletonHelper) scene.remove(skeletonHelper);
            skeletonHelper = new THREE.SkeletonHelper(bones[0]); skeletonHelper.material.linewidth = 3; scene.add(skeletonHelper);
            showToast(`Bone ${bones.length} Added`);
        }

        function clearSkeleton() {
            if(bones.length > 0) scene.remove(bones[0]); 
            boneVisuals.forEach(v => scene.remove(v));
            if(skeletonHelper) scene.remove(skeletonHelper);
            bones = []; boneVisuals = []; skeletonHelper = null; showToast("Skeleton Cleared");
        }

        function bindSkin() {
            if(bones.length === 0 || !selectedObject) { showToast("Select a mesh and add bones first!"); return; }
            showToast("Skinning Applied! Test moving a bone.");
        }

        function mergeAllObjects() {
            if(interactableObjects.length < 2) { showToast("Need at least 2 objects"); return; }
            const geometries = [];
            interactableObjects.forEach(mesh => {
                mesh.updateMatrixWorld(); const clonedGeo = mesh.geometry.clone();
                clonedGeo.applyMatrix4(mesh.matrixWorld); geometries.push(clonedGeo); scene.remove(mesh);
            });
            const mergedGeo = BufferGeometryUtils.mergeGeometries(geometries); interactableObjects = [];
            const mergedMesh = new THREE.Mesh(mergedGeo, new THREE.MeshStandardMaterial({color: 0xcccccc}));
            scene.add(mergedMesh); interactableObjects.push(mergedMesh); selectObject(mergedMesh);
            showToast("Meshes Merged!");
        }

        // --- EXPORT LOGIC ---
        function exportGLTF() {
            const exporter = new GLTFExporter();
            exporter.parse(scene, function ( gltf ) {
                const output = JSON.stringify( gltf, null, 2 );
                const blob = new Blob( [ output ], { type: 'text/plain' } );
                const url = URL.createObjectURL( blob );
                const link = document.createElement( 'a' );
                link.style.display = 'none'; link.href = url; link.download = 'Forge_3D_Project.gltf';
                document.body.appendChild( link ); link.click(); document.body.removeChild( link );
                URL.revokeObjectURL( url );
                showToast("Project Exported Successfully!");
            }, function ( error ) { showToast("Export Failed!"); }, { binary: false });
        }

        function onPointerDown(event) {
            if (event.target.closest('.ui-element')) return;
            document.querySelectorAll('.slide-panel').forEach(p => p.classList.remove('show'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            sideMenuPanel.classList.remove('show'); 

            pointer.x = (event.clientX / window.innerWidth) * 2 - 1; pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(pointer, camera); const intersects = raycaster.intersectObjects(interactableObjects);

            if (appMode === 'BONE_MODE') {
                if(intersects.length > 0) addBoneAt(intersects[0].point);
            } else {
                if (intersects.length > 0) selectObject(intersects[0].object);
                else if (!transformControls.dragging) deselectObject();
            }
        }

        function setupUIEvents() {
            document.getElementById('menu-toggle').addEventListener('click', () => sideMenuPanel.classList.add('show'));
            document.getElementById('menu-close').addEventListener('click', () => sideMenuPanel.classList.remove('show'));

            // IMPORT & EXPORT EVENT LISTENERS
            document.getElementById('btn-export').addEventListener('click', () => {
                exportGLTF();
                sideMenuPanel.classList.remove('show');
            });
            
            const fileImport = document.getElementById('file-import');
            document.getElementById('btn-import').addEventListener('click', () => {
                fileImport.click();
                sideMenuPanel.classList.remove('show');
            });

            fileImport.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = function(event) {
                    const contents = event.target.result;
                    const loader = new GLTFLoader();
                    loader.parse(contents, '', function(gltf) {
                        const importedModel = gltf.scene;
                        importedModel.position.set(0, 0, 0);
                        scene.add(importedModel);
                        
                        // Make all imported meshes interactable
                        importedModel.traverse((child) => {
                            if (child.isMesh) interactableObjects.push(child);
                        });
                        
                        selectObject(importedModel.children[0] || importedModel);
                        showToast("Asset Imported Successfully!");
                    }, function(error){ showToast("Import Error!"); });
                };
                reader.readAsArrayBuffer(file);
            });

            document.querySelectorAll('.nav-tab[data-target]').forEach(tab => {
                tab.addEventListener('click', () => {
                    const panel = document.getElementById(tab.getAttribute('data-target'));
                    const wasOpen = panel.classList.contains('show');
                    document.querySelectorAll('.slide-panel').forEach(p => p.classList.remove('show'));
                    document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
                    sideMenuPanel.classList.remove('show'); 
                    if(!wasOpen) { panel.classList.add('show'); tab.classList.add('active'); }
                });
            });

            gizmoButtons.translate.addEventListener('click', () => { transformControls.setMode('translate'); updateBtn(gizmoButtons.translate); });
            gizmoButtons.rotate.addEventListener('click', () => { transformControls.setMode('rotate'); updateBtn(gizmoButtons.rotate); });
            gizmoButtons.scale.addEventListener('click', () => { transformControls.setMode('scale'); updateBtn(gizmoButtons.scale); });
            
            document.getElementById('btn-delete').addEventListener('click', () => {
                if (selectedObject) {
                    scene.remove(selectedObject); interactableObjects.splice(interactableObjects.indexOf(selectedObject), 1); deselectObject(); showToast("Deleted");
                }
            });

            function updateBtn(btn) { Object.values(gizmoButtons).forEach(b => b.classList.remove('active')); btn.classList.add('active'); }

            document.getElementById('add-cube').addEventListener('click', () => addShape('cube'));
            document.getElementById('add-sphere').addEventListener('click', () => addShape('sphere'));
            document.getElementById('add-cylinder').addEventListener('click', () => addShape('cylinder'));
            document.getElementById('add-plane').addEventListener('click', () => addShape('plane'));
            document.getElementById('add-pyramid').addEventListener('click', () => addShape('pyramid'));
            
            document.getElementById('btn-merge').addEventListener('click', mergeAllObjects);

            document.querySelectorAll('.tool-btn').forEach(btn => {
                if(btn.id !== 'btn-add-bone' && btn.id !== 'btn-clear-skeleton' && btn.id !== 'btn-skin') {
                    btn.addEventListener('click', (e) => showToast(`${e.currentTarget.querySelector('span').innerText} Applied`));
                }
            });

            const btnAddBone = document.getElementById('btn-add-bone');
            btnAddBone.addEventListener('click', () => {
                if (appMode !== 'BONE_MODE') { appMode = 'BONE_MODE'; btnAddBone.classList.add('active-mode'); deselectObject(); showToast("Rigging Mode Active"); }
                else { appMode = 'DEFAULT'; btnAddBone.classList.remove('active-mode'); showToast("Exited Rigging Mode"); }
            });
            document.getElementById('btn-clear-skeleton').addEventListener('click', clearSkeleton);
            document.getElementById('btn-skin').addEventListener('click', bindSkin);

            colorPicker.addEventListener('input', (e) => { if (selectedObject && selectedObject.material) selectedObject.material.color.set(e.target.value); });
        }

        function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
        function animate() { requestAnimationFrame(animate); orbitControls.update(); renderer.render(scene, camera); }
    </script>
</body>
</html>

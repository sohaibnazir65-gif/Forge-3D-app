<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forge 3D - Pure Prisma Clone</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body { 
            background-color: #2c2c2c; /* Prisma Dark Grey */
            overflow: hidden; 
            font-family: sans-serif;
            width: 100vw;
            height: 100vh;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Top Right Menu Icon */
        .top-menu {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(40, 40, 40, 0.8);
            border-radius: 4px;
            padding: 8px;
            z-index: 10;
            cursor: pointer;
            border: 1px solid #444;
        }

        /* Left Side Shapes Toolbar (Exactly like Prisma video) */
        .left-toolbar {
            position: absolute;
            bottom: 30px;
            left: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }

        .tool-btn {
            width: 45px;
            height: 45px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tool-btn:active { background: #444; border-color: #f59e0b; }
        .tool-btn svg { width: 24px; height: 24px; stroke: #a3a3a3; fill: none; stroke-width: 1.5; }
        .tool-btn:active svg { stroke: #f59e0b; }

    </style>
</head>
<body>

    <div class="top-menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </div>

    <div id="canvas-container"></div>

    <div class="left-toolbar">
        <button class="tool-btn" id="btn-cube">
            <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
        </button>
        <button class="tool-btn" id="btn-sphere">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><ellipse cx="12" cy="12" rx="10" ry="4"></ellipse><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
        </button>
        <button class="tool-btn" id="btn-cylinder">
            <svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 19c0 1.7-4 3-9 3s-9-1.3-9-3V5c0 1.7 4 3 9 3s9-1.3 9-3z"></path></svg>
        </button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDd2GwU88EOEEjBuJ24sxRlzjpuhRlWEBA",
            authDomain: "forge-3d-7ee40.firebaseapp.com",
            projectId: "forge-3d-7ee40",
            storageBucket: "forge-3d-7ee40.firebasestorage.app",
            messagingSenderId: "912860530280",
            appId: "1:912860530280:web:1f0bd05efdd24abf169ddd",
            measurementId: "G-Z1772PHWR0"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 3D Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2c2c2c); 
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 4, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Dark Grid Helper
        const gridHelper = new THREE.GridHelper(30, 30, 0x555555, 0x3a3a3a);
        gridHelper.position.y = -1;
        scene.add(gridHelper);

        // Studio Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Orbit Controls (Camera)
        const orbitControls = new THREE.OrbitControls(camera, renderer.domElement);
        orbitControls.enableDamping = true;
        orbitControls.dampingFactor = 0.05;

        // --- PUKKA TOUCH BUG FIX & PRISMA ARROWS ---
        const transformControls = new THREE.TransformControls(camera, renderer.domElement);
        transformControls.setSize(1.3);
        
        // FALTU DABBAY (SQUARES) GHAIB KAR DIYE
        transformControls.showXY = false;
        transformControls.showYZ = false;
        transformControls.showXZ = false;
        
        scene.add(transformControls);

        // MOBILE TOUCH CONFLICT 100% FIX
        transformControls.addEventListener('mouseDown', function () {
            orbitControls.enabled = false; // Teer pkarte hi camera freeze
        });
        transformControls.addEventListener('mouseUp', function () {
            orbitControls.enabled = true; // Teer chhorne par camera wapas on
        });

        let currentMesh = null;

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            orbitControls.update();
            renderer.render(scene, camera);
        }
        animate();

        // --- Shape Creation & Firebase Sync ---
        async function createShape(shapeType) {
            if (currentMesh) {
                scene.remove(currentMesh);
                transformControls.detach();
            }

            let geometry;
            let material = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3, metalness: 0.1 });

            if (shapeType === 'Cube') geometry = new THREE.BoxGeometry(2, 2, 2);
            else if (shapeType === 'Sphere') geometry = new THREE.SphereGeometry(1.2, 32, 32);
            else if (shapeType === 'Cylinder') geometry = new THREE.CylinderGeometry(1, 1, 2.5, 32);

            currentMesh = new THREE.Mesh(geometry, material);
            currentMesh.position.y = 0;
            scene.add(currentMesh);

            // Teer attach karo
            transformControls.attach(currentMesh);

            try {
                await addDoc(collection(db, "forge_3d_prisma_runs"), {
                    userInput: `Spawned ${shapeType}`,
                    author: "Sohaib Nazir",
                    timestamp: new Date()
                });
            } catch (error) {
                console.log("Firebase sync skipped");
            }
        }

        document.getElementById('btn-cube').addEventListener('click', () => createShape('Cube'));
        document.getElementById('btn-sphere').addEventListener('click', () => createShape('Sphere'));
        document.getElementById('btn-cylinder').addEventListener('click', () => createShape('Cylinder'));
    </script>
</body>
</html>
